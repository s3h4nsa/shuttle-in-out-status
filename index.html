<!DOCTYPE html>
<html lang="en">
<head><script type="text/javascript" src="/___vscode_livepreview_injected_script"></script>
<meta charset="UTF-8">
<meta name="theme-color" content="#1856a4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Shuttle Tracker">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shuttle Tracker</title>
<!-- iOS system font -->
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="status-bar"></div>
<header>
 <div class="logo-text">
  <div class="logo-name">Polgasowita WH</div>
  <div class="logo-row">
    <div class="logo-sub">Shuttle Tracker</div>
    <div id="live-datetime" class="live-datetime">--</div>
  </div>
</div>
</header>

<main>
  <div id="categories-container"></div>
</main>

<!-- Confirm / Preview Modal -->
<div class="overlay" id="confirm-modal">
  <div class="modal">
    <div class="modal-title">Preview WhatsApp Message</div>
    <textarea id="confirm-msg" readonly></textarea>
    <button class="btn-secondary" id="copy-msg-btn">Copy Message</button>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeOverlay('confirm-modal')">Cancel</button>
      <button class="btn-primary" id="confirm-send-btn">Send</button>
    </div>
  </div>
</div>

<script src="shuttles.js"></script>
<script src="app.js"></script>
<script>
function openOverlay(id){ document.getElementById(id).classList.add('open'); }
function closeOverlay(id){ document.getElementById(id).classList.remove('open'); }
</script>
</body>
</html>
