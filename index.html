<!DOCTYPE html>
<html>
<head>
  <title>Shuttle Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2 class="title">Shuttle Dashboard</h2>

<input id="search" placeholder="Search shuttle..." />

<div id="app"></div>

<!-- CONFIRM MODAL -->
<div id="confirmModal" class="modal">
  <div class="modal-box">
    <h3 id="confirmText"></h3>

    <!-- MESSAGE PREVIEW -->
    <div id="previewBox"></div>

    <div class="modal-actions">
      <button onclick="confirmSend()" class="btn yes">SEND</button>
      <button onclick="closeModal()" class="btn no">CANCEL</button>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
