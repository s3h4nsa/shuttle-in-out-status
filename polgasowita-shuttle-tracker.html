<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polgasowita WH – Shuttle Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f7f5;
  --white: #ffffff;
  --surface: #ffffff;
  --surface2: #f2f2f0;
  --border: #e8e8e6;
  --border-strong: #d0d0cc;
  --ink: #111110;
  --ink-mid: #666662;
  --ink-dim: #9b9b97;
  --accent: #e8520a;
  --accent-light: #fff3ee;
  --green: #16a34a;
  --green-bg: #f0fdf4;
  --green-border: #bbf7d0;
  --red: #dc2626;
  --red-bg: #fef2f2;
  --red-border: #fecaca;
  --blue: #2563eb;
  --blue-bg: #eff6ff;
  --purple: #7c3aed;
  --purple-bg: #f5f3ff;
  --font: 'Outfit', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 32px; height: 32px;
  background: var(--ink);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}

.logo-text { line-height: 1; }
.logo-name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -.2px;
  color: var(--ink);
}
.logo-sub {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink-dim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 2px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.clock {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-dim);
  letter-spacing: .5px;
  padding: 0 10px;
}

.btn-hdr {
  height: 32px;
  padding: 0 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--white);
  color: var(--ink-mid);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  display: flex; align-items: center; gap: 6px;
}
.btn-hdr:hover {
  border-color: var(--border-strong);
  color: var(--ink);
  background: var(--surface2);
}
.btn-hdr.primary {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}
.btn-hdr.primary:hover { opacity: .88; }

/* ── STATS STRIP ── */
.stats-strip {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex;
  gap: 0;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px 12px 0;
  margin-right: 20px;
  border-right: 1px solid var(--border);
}
.stat-item:last-child { border-right: none; }

.stat-pip {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.stat-body { line-height: 1; }
.stat-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--ink-dim);
  margin-bottom: 4px;
}
.stat-num {
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -.5px;
}

/* ── MAIN ── */
main {
  padding: 28px 32px;
  max-width: 1280px;
  margin: 0 auto;
}

/* ── CATEGORY SECTION ── */
.cat-section { margin-bottom: 32px; }

.cat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.cat-left { display: flex; align-items: center; gap: 10px; }

.cat-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.cat-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -.2px;
}

.cat-pill {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-dim);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 20px;
}

.btn-add-cat {
  display: flex;
  align-items: center;
  gap: 5px;
  height: 28px;
  padding: 0 12px;
  border-radius: var(--radius-sm);
  border: 1px dashed var(--border-strong);
  background: none;
  color: var(--ink-dim);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}
.btn-add-cat:hover {
  border-style: solid;
  border-color: var(--ink);
  color: var(--ink);
  background: var(--surface2);
}

/* ── DIVIDER ── */
.cat-divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 14px;
}

/* ── SHUTTLE GRID ── */
.shuttle-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
}

/* ── SHUTTLE CARD ── */
.sh-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  transition: box-shadow .2s, border-color .2s;
  position: relative;
  overflow: hidden;
}
.sh-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--border-strong);
}

.sh-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 3px;
  border-radius: var(--radius) 0 0 var(--radius);
}
.sh-card::after { background: var(--border-strong); }
.sh-card.status-in::after { background: var(--green); }

.sh-in-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--green);
  background: var(--green-bg);
  border: 1px solid var(--green-border);
  padding: 2px 7px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}
.sh-in-badge::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
}

.sh-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 8px;
  padding-left: 8px;
}

.sh-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -.1px;
  flex: 1;
  padding-right: 8px;
  line-height: 1.3;
}



.sh-meta {
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-dim);
  margin-bottom: 12px;
  padding-left: 8px;
}
.sh-meta-sep { color: var(--border-strong); }

.sh-actions {
  display: flex;
  gap: 6px;
  padding-left: 8px;
}



.btn-icon {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: none;
  color: var(--ink-dim);
  cursor: pointer;
  font-size: 12px;
  transition: all .15s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.btn-icon.wa {
  background: #25D366;
  border-color: #25D366;
  color: #fff;
}
.btn-icon.wa:hover { opacity: .85; }
.btn-icon:hover:not(.wa) {
  border-color: var(--border-strong);
  color: var(--ink);
  background: var(--surface2);
}
.btn-icon.del:hover {
  border-color: var(--red-border);
  color: var(--red);
  background: var(--red-bg);
}

.sh-footer {
  margin-top: 10px;
  padding-top: 8px;
  padding-left: 8px;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink-dim);
  letter-spacing: .3px;
}

/* ── EMPTY STATE ── */
.cat-empty {
  grid-column: 1/-1;
  padding: 28px 20px;
  text-align: center;
  border: 1.5px dashed var(--border);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-dim);
  letter-spacing: .3px;
}

/* ── OVERLAY / MODAL ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.35);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(2px);
}
.overlay.open { display: flex; }

.modal {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow-md);
  animation: fadeUp .2s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

.modal-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -.3px;
  margin-bottom: 20px;
  color: var(--ink);
}

.fg { margin-bottom: 14px; }
.fg label {
  display: block;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink-dim);
  margin-bottom: 6px;
}
.fg input, .fg select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--ink);
  padding: 9px 12px;
  font-family: var(--font);
  font-size: 14px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  appearance: none;
}
.fg input:focus, .fg select:focus {
  border-color: var(--ink);
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(0,0,0,.06);
}

.fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.modal-btns { display: flex; gap: 8px; margin-top: 20px; }

.btn-primary {
  flex: 1;
  height: 38px;
  background: var(--ink);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}
.btn-primary:hover { opacity: .85; }

.btn-secondary {
  flex: 1;
  height: 38px;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--ink-mid);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}
.btn-secondary:hover {
  border-color: var(--border-strong);
  color: var(--ink);
  background: var(--surface2);
}

/* ── WA MODAL ── */
.wa-modal {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  width: 100%;
  max-width: 460px;
  box-shadow: var(--shadow-md);
  animation: fadeUp .2s ease;
}
.wa-modal-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}
.wa-logo-circle {
  width: 32px; height: 32px;
  background: #25D366;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.wa-modal-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -.2px;
  color: var(--ink);
}
.wa-modal-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-dim);
  margin-bottom: 16px;
  margin-left: 42px;
  letter-spacing: .3px;
}
.msg-box {
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
  border-radius: 0 10px 10px 10px;
  padding: 12px 14px;
  font-family: var(--mono);
  font-size: 11px;
  color: #166534;
  margin-bottom: 14px;
  white-space: pre-wrap;
  line-height: 1.7;
  max-height: 150px;
  overflow-y: auto;
  position: relative;
}
.msg-box::before {
  content: '';
  position: absolute;
  top: 0; left: -6px;
  width: 0; height: 0;
  border-top: 6px solid #bbf7d0;
  border-left: 6px solid transparent;
}

.contacts-hdr {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink-dim);
  margin-bottom: 8px;
}

.contacts-scroll { max-height: 160px; overflow-y: auto; margin-bottom: 12px; }

.contact-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 5px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  background: var(--white);
}
.contact-row:hover { border-color: #86efac; }
.contact-row.sel  { border-color: #25D366; background: #f0fdf4; }
.contact-row input[type=checkbox] { accent-color: #25D366; }
.contact-row-name { font-size: 13px; font-weight: 500; color: var(--ink); flex: 1; }
.contact-row-num  { font-family: var(--mono); font-size: 10px; color: var(--ink-dim); }

.no-contacts {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-dim);
  padding: 16px;
  text-align: center;
  border: 1px dashed var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
}

.btn-send-wa {
  width: 100%;
  height: 40px;
  background: #25D366;
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-bottom: 8px;
  transition: opacity .2s;
}
.btn-send-wa:hover { opacity: .88; }

/* ── DRAWER ── */
.drawer {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 380px;
  background: var(--white);
  border-left: 1px solid var(--border);
  z-index: 300;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.drawer.open { transform: translateX(0); }

.drawer-hdr {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.drawer-hdr-title { font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: -.2px; }
.btn-close-drawer {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: none;
  color: var(--ink-dim);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.btn-close-drawer:hover { background: var(--surface2); color: var(--ink); border-color: var(--border-strong); }

.drawer-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  padding: 0 20px;
  gap: 0;
}
.dtab {
  padding: 10px 14px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-dim);
  transition: all .15s;
  margin-bottom: -1px;
}
.dtab:hover { color: var(--ink); }
.dtab.active { color: var(--ink); border-bottom-color: var(--ink); }

.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.drawer-section-title {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--ink-dim);
  margin-bottom: 10px;
  margin-top: 20px;
}
.drawer-section-title:first-child { margin-top: 0; }

.contact-item-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 5px;
}
.ci-info { flex: 1; }
.ci-name { font-size: 13px; font-weight: 500; color: var(--ink); }
.ci-num  { font-family: var(--mono); font-size: 10px; color: var(--ink-dim); margin-top: 1px; }
.btn-del-ci {
  width: 24px; height: 24px;
  border-radius: 4px;
  border: none;
  background: none;
  color: var(--ink-dim);
  cursor: pointer;
  font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.btn-del-ci:hover { background: var(--red-bg); color: var(--red); }

.tpl-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin-bottom: 10px;
}
.tpl-lbl {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--ink-dim);
  margin-bottom: 6px;
}
.tpl-box textarea {
  width: 100%;
  background: none;
  border: none;
  color: var(--ink);
  font-family: var(--mono);
  font-size: 11px;
  resize: vertical;
  outline: none;
  min-height: 80px;
  line-height: 1.7;
}

.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* ── LOG TABLE ── */
.log-table {
  width: 100%;
  border-collapse: collapse;
}
.log-table td {
  font-family: var(--mono);
  font-size: 10px;
  padding: 8px 8px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.5;
}
.log-table tr:last-child td { border-bottom: none; }
.lt-time    { color: var(--ink-dim); white-space: nowrap; padding-right: 10px; }
.lt-shuttle { color: var(--ink); font-weight: 500; }
.lt-action-in  { color: var(--green); font-weight: 500; }
.lt-action-out { color: var(--red);   font-weight: 500; }
.lt-action-wa  { color: #25D366;      font-weight: 500; }
.lt-detail  { color: var(--ink-dim); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 20px; right: 20px;
  background: var(--ink);
  color: #fff;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  z-index: 500;
  transform: translateY(50px);
  opacity: 0;
  transition: all .25s cubic-bezier(.4,0,.2,1);
  box-shadow: var(--shadow-md);
  max-width: 260px;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  header { padding: 0 16px; }
  .stats-strip { padding: 0 16px; gap: 0; }
  main { padding: 20px 16px; }
  .drawer { width: 100%; }
  .stat-item { padding: 12px 12px 12px 0; margin-right: 12px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">🏭</div>
    <div class="logo-text">
      <div class="logo-name">Polgasowita WH</div>
      <div class="logo-sub">Shuttle Tracker</div>
    </div>
  </div>
  <div class="header-right">
    <span class="clock" id="clock">--:--:--</span>
    <button class="btn-hdr" onclick="openDrawer('log')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="2" width="12" height="12" rx="2"/><line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="8.5" x2="11" y2="8.5"/><line x1="5" y1="11" x2="8" y2="11"/>
      </svg>
      Log
    </button>
    <button class="btn-hdr primary" onclick="openDrawer('settings')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/>

<!-- ADD / EDIT SHUTTLE MODAL -->

<div class="overlay" id="wa-modal">
  <div class="wa-modal">
    <div class="wa-modal-header">
      <div class="wa-logo-circle">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.117 1.528 5.845L0 24l6.336-1.508A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.817 9.817 0 01-5.001-1.372l-.358-.213-3.76.895.955-3.668-.234-.377A9.818 9.818 0 012.182 12C2.182 6.58 6.58 2.182 12 2.182S21.818 6.58 21.818 12 17.42 21.818 12 21.818z"/></svg>
      </div>

      <svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.117 1.528 5.845L0 24l6.336-1.508A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.817 9.817 0 01-5.001-1.372l-.358-.213-3.76.895.955-3.668-.234-.377A9.818 9.818 0 012.182 12C2.182 6.58 6.58 2.182 12 2.182S21.818 6.58 21.818 12 17.42 21.818 12 21.818z"/></svg>
      Open WhatsApp
    </button>
    <button class="btn-secondary" onclick="closeOverlay('wa-modal')">Cancel</button>
  </div>
</div>

<!-- ADMIN DRAWER -->
<div class="drawer" id="main-drawer">
  <div class="drawer-hdr">
    <div class="drawer-hdr-title" id="drawer-title">Admin Panel</div>
    <button class="btn-close-drawer" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-tabs">
    <button class="dtab active" onclick="switchTab('settings')" id="tab-settings">Settings</button>
    <button class="dtab" onclick="switchTab('contacts')" id="tab-contacts">Contacts</button>
    <button class="dtab" onclick="switchTab('log')" id="tab-log">Log</button>
  </div>
  <div class="drawer-body">

    <!-- SETTINGS -->
    <div class="tab-pane active" id="pane-settings">
      <div class="drawer-section-title">Message Template</div>
      <div class="tpl-box">
        <div class="tpl-lbl">WhatsApp Message</div>
        <textarea id="tpl-msg">{name} {cat} now in Polgasowita WH {time}</textarea>
      </div>
      <div class="fg" style="margin-top:16px">
        <label>Warehouse Name</label>
        <input type="text" id="wh-name" value="Polgasowita WH">
      </div>
      <button class="btn-primary" style="width:100%;margin-top:6px" onclick="saveSettings()">Save Settings</button>
      <button style="width:100%;margin-top:8px;height:38px;background:none;border:1px solid var(--red-border);border-radius:var(--radius-sm);color:var(--red);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s" onmouseover="this.style.background='var(--red-bg)'" onmouseout="this.style.background='none'" onclick="resetDay()">Reset Day</button>
    </div>

    <!-- CONTACTS -->
    <div class="tab-pane" id="pane-contacts">
      <div class="drawer-section-title">WhatsApp Contacts</div>
      <div id="contacts-list-drawer"></div>
      <div class="fg-row" style="margin-top:10px">
        <div class="fg" style="margin:0"><input type="text" id="new-c-name" placeholder="Name" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--ink);padding:8px 10px;font-family:var(--font);font-size:13px;outline:none"></div>
        <div class="fg" style="margin:0"><input type="text" id="new-c-num" placeholder="+94771234567" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--ink);padding:8px 10px;font-family:var(--font);font-size:13px;outline:none"></div>
      </div>
      <button class="btn-primary" style="width:100%;margin-top:8px" onclick="addContact()">+ Add Contact</button>
    </div>

    <!-- LOG -->
    <div class="tab-pane" id="pane-log">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="drawer-section-title" style="margin:0">Activity Log</div>
        <button onclick="clearLog()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;font-family:var(--font);font-weight:500">Clear</button>
      </div>
      <div id="log-container"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const CATS = [
  { id: 'pickup',  label: 'Pickup Shuttle', color: '#2563eb' },
  { id: 'branch',  label: 'Branch Shuttle', color: '#7c3aed' },
  { id: 'shuttle', label: 'Shuttle',        color: '#16a34a' }
];

let shuttles   = load('shuttles', []);
let contacts   = load('contacts', []);
let actLog     = load('log', []);
let waMsgCount = load('waMsgCount', 0);
let waCtx      = null;

// ═══════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB');
}, 1000);

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render() {
  renderCategories();
  renderStats();
  save('shuttles', shuttles);
}

function renderCategories() {
  const container = document.getElementById('categories-container');
  container.innerHTML = CATS.map(cat => {
    const catShuttles = shuttles.filter(s => s.cat === cat.id);
    return `
      <div class="cat-section">
        <div class="cat-header">
          <div class="cat-left">
            <div class="cat-dot" style="background:${cat.color}"></div>
            <div class="cat-title">${cat.label}</div>
            <div class="cat-pill">${catShuttles.length}</div>
          </div>
          <button class="btn-add-cat" onclick="openAddModal('${cat.id}')">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8">
              <line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/>
            </svg>
            Add
          </button>
        </div>
        <div class="cat-divider"></div>
        <div class="shuttle-grid">
          ${catShuttles.length === 0
            ? `<div class="cat-empty">No ${cat.label.toLowerCase()}s added — click Add</div>`
            : catShuttles.map(s => renderShuttleCard(s)).join('')
          }
        </div>
      </div>
    `;
  }).join('');
}

function renderShuttleCard(s) {
  const isIn = s.status === 'in';
  const meta = [s.from, s.driver].filter(Boolean).join(' · ') || '—';
  return `
    <div class="sh-card${isIn ? ' status-in' : ''}">
      <div class="sh-top">
        <div class="sh-name">${s.name}</div>
        ${isIn ? `<div class="sh-in-badge">In Yard</div>` : ''}
      </div>
      <div class="sh-meta">${meta}</div>
      <div class="sh-actions">
        <button class="btn-icon wa" onclick="openShWa('${s.id}')" title="Send WhatsApp">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.117 1.528 5.845L0 24l6.336-1.508A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.817 9.817 0 01-5.001-1.372l-.358-.213-3.76.895.955-3.668-.234-.377A9.818 9.818 0 012.182 12C2.182 6.58 6.58 2.182 12 2.182S21.818 6.58 21.818 12 17.42 21.818 12 21.818z"/></svg>
        </button>
        <button class="btn-icon" onclick="openEditModal('${s.id}')" title="Edit">✏</button>
        <button class="btn-icon del" onclick="deleteShuttle('${s.id}')" title="Delete">✕</button>
      </div>
      ${s.lastTime ? `<div class="sh-footer">Last sent: ${s.lastTime}</div>` : ''}
    </div>
  `;
}

function renderStats() {
  const inCount = shuttles.filter(s => s.status === 'in').length;
  document.getElementById('st-total').textContent = shuttles.length;
  document.getElementById('st-in').textContent    = inCount;
  document.getElementById('st-wa').textContent    = waMsgCount;
}

// ═══════════════════════════════════════════════
// SHUTTLE CRUD
// ═══════════════════════════════════════════════
function openAddModal(cat) {
  document.getElementById('sh-modal-title').textContent = 'Add Shuttle';
  document.getElementById('sh-edit-id').value  = '';
  document.getElementById('sh-name').value     = '';
  document.getElementById('sh-from').value     = '';
  document.getElementById('sh-driver').value   = '';
  document.getElementById('sh-cat').value      = cat || 'pickup';
  openOverlay('shuttle-modal');
}

function openEditModal(id) {
  const s = shuttles.find(x => x.id === id);
  document.getElementById('sh-modal-title').textContent = 'Edit Shuttle';
  document.getElementById('sh-edit-id').value  = id;
  document.getElementById('sh-name').value     = s.name;
  document.getElementById('sh-from').value     = s.from || '';
  document.getElementById('sh-driver').value   = s.driver || '';
  document.getElementById('sh-cat').value      = s.cat;
  openOverlay('shuttle-modal');
}

function saveShuttle() {
  const name = document.getElementById('sh-name').value.trim();
  if (!name) { toast('Shuttle name required'); return; }
  const editId = document.getElementById('sh-edit-id').value;
  const data = {
    name,
    from:   document.getElementById('sh-from').value.trim(),
    driver: document.getElementById('sh-driver').value.trim(),
    cat:    document.getElementById('sh-cat').value,
  };
  if (editId) {
    const idx = shuttles.findIndex(s => s.id === editId);
    shuttles[idx] = { ...shuttles[idx], ...data };
    toast(`${name} updated`);
  } else {
    shuttles.push({ ...data, id: uid(), status: 'pending', lastTime: null, lastAction: null });
    toast(`${name} added`);
  }
  closeOverlay('shuttle-modal');
  render();
}

function deleteShuttle(id) {
  const s = shuttles.find(x => x.id === id);
  if (!confirm(`Delete "${s.name}"?`)) return;
  shuttles = shuttles.filter(x => x.id !== id);
  render();
  toast('Shuttle removed');
}



// ═══════════════════════════════════════════════
// WHATSAPP
// ═══════════════════════════════════════════════
function openShWa(id) {
  const s = shuttles.find(x => x.id === id);
  waCtx = { type: 'shuttle', id };
  const catLabel = CATS.find(c => c.id === s.cat)?.label || s.cat;
  const tpl = getSetting('tpl-msg', document.getElementById('tpl-msg').value);
  const msg = tpl
    .replace(/{name}/g,   s.name)
    .replace(/{from}/g,   s.from || 'N/A')
    .replace(/{cat}/g,    catLabel)
    .replace(/{driver}/g, s.driver || 'N/A')
    .replace(/{time}/g,   nowStr());
  document.getElementById('wa-sub').textContent = `${s.name} · ${catLabel}`;
  document.getElementById('wa-msg').textContent = msg;
  buildContactsList();
  openOverlay('wa-modal');
}

function buildContactsList() {
  const el = document.getElementById('wa-contacts');
  if (contacts.length === 0) {
    el.innerHTML = '<div class="no-contacts">No contacts yet. Add contacts in Admin → Contacts.</div>';
    return;
  }
  el.innerHTML = contacts.map((c, i) => `
    <label class="contact-row" id="cr-${i}">
      <input type="checkbox" value="${i}" onchange="toggleCr(${i})">
      <span class="contact-row-name">${c.name}</span>
      <span class="contact-row-num">${c.num}</span>
    </label>
  `).join('');
}

function toggleCr(i) {
  document.getElementById(`cr-${i}`).classList.toggle('sel');
}

function sendWa() {
  const checked = document.querySelectorAll('#wa-contacts input[type=checkbox]:checked');
  if (checked.length === 0) { toast('Select at least one contact'); return; }
  const msg = document.getElementById('wa-msg').textContent;
  checked.forEach(cb => {
    const c   = contacts[parseInt(cb.value)];
    const num = c.num.replace(/[^0-9]/g, '');
    window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
  });
  waMsgCount += checked.length;
  save('waMsgCount', waMsgCount);
  // Mark shuttle as IN and record sent time
  if (waCtx.type === 'shuttle') {
    const s = shuttles.find(x => x.id === waCtx.id);
    if (s) {
      s.status   = 'in';
      s.lastTime = nowStr();
      save('shuttles', shuttles);
    }
  }
  const label = shuttles.find(s => s.id === waCtx.id)?.name || '?';
  addLog(label, 'wa', `WhatsApp sent to ${checked.length} contact(s)`);
  closeOverlay('wa-modal');
  render();
  toast(`WhatsApp opened for ${checked.length} contact(s)`);
}

// ═══════════════════════════════════════════════
// CONTACTS
// ═══════════════════════════════════════════════
function addContact() {
  const name = document.getElementById('new-c-name').value.trim();
  const num  = document.getElementById('new-c-num').value.trim();
  if (!name || !num) { toast('Name and number required'); return; }
  contacts.push({ name, num });
  save('contacts', contacts);
  document.getElementById('new-c-name').value = '';
  document.getElementById('new-c-num').value  = '';
  renderContactsDrawer();
  toast(`${name} added`);
}

function deleteContact(i) {
  contacts.splice(i, 1);
  save('contacts', contacts);
  renderContactsDrawer();
}

function renderContactsDrawer() {
  const el = document.getElementById('contacts-list-drawer');
  if (contacts.length === 0) {
    el.innerHTML = '<div style="font-family:var(--mono);font-size:11px;color:var(--ink-dim);margin-bottom:10px">No contacts added yet.</div>';
    return;
  }
  el.innerHTML = contacts.map((c, i) => `
    <div class="contact-item-row">
      <div class="ci-info">
        <div class="ci-name">${c.name}</div>
        <div class="ci-num">${c.num}</div>
      </div>
      <button class="btn-del-ci" onclick="deleteContact(${i})">✕</button>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
// LOG
// ═══════════════════════════════════════════════
function addLog(shuttle, action, detail) {
  actLog.unshift({ time: nowStr(), shuttle, action, detail });
  if (actLog.length > 150) actLog.pop();
  save('log', actLog);
}

function renderLog() {
  const el = document.getElementById('log-container');
  if (actLog.length === 0) {
    el.innerHTML = '<div style="font-family:var(--mono);font-size:11px;color:var(--ink-dim);text-align:center;padding:20px">No activity yet</div>';
    return;
  }
  el.innerHTML = `<table class="log-table">${actLog.map(l => `
    <tr>
      <td class="lt-time">${l.time}</td>
      <td class="lt-shuttle">${l.shuttle}</td>
      <td class="${l.action === 'in' ? 'lt-action-in' : l.action === 'wa' ? 'lt-action-wa' : 'lt-action-out'}">${l.action === 'in' ? '↓ IN' : l.action === 'wa' ? '↗ WA' : '↑ OUT'}</td>
      <td class="lt-detail">${l.detail}</td>
    </tr>
  `).join('')}</table>`;
}

function clearLog() {
  // Inline confirm — avoid confirm() which fails in iframes
  const el = document.getElementById('log-container');
  el.innerHTML = `
    <div style="background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--radius-sm);padding:14px 16px;text-align:center">
      <div style="font-size:13px;font-weight:500;color:var(--ink);margin-bottom:10px">Clear all log entries?</div>
      <div style="display:flex;gap:8px;justify-content:center">
        <button onclick="confirmClearLog()" style="height:32px;padding:0 16px;background:var(--red);border:none;border-radius:var(--radius-sm);color:#fff;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer">Yes, clear</button>
        <button onclick="renderLog()" style="height:32px;padding:0 16px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--ink-mid);font-family:var(--font);font-size:12px;cursor:pointer">Cancel</button>
      </div>
    </div>`;
}

function confirmClearLog() {
  actLog = [];
  save('log', actLog);
  renderLog();
  toast('Log cleared');
}

// ═══════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════
function saveSettings() {
  setSetting('tpl-msg', document.getElementById('tpl-msg').value);
  setSetting('wh-name', document.getElementById('wh-name').value);
  toast('Settings saved');
}

function resetDay() {
  // reset all IN statuses and sent times
  shuttles.forEach(s => { s.status = 'pending'; s.lastTime = null; });
  save('shuttles', shuttles);
  waMsgCount = 0;
  save('waMsgCount', waMsgCount);
  addLog('System', 'wa', 'Day reset — all shuttles cleared');
  render();
  toast('Day reset complete');
}

// ═══════════════════════════════════════════════
// DRAWER / MODALS
// ═══════════════════════════════════════════════
function openDrawer(tab) {
  document.getElementById('main-drawer').classList.add('open');
  switchTab(tab);
}

function closeDrawer() {
  document.getElementById('main-drawer').classList.remove('open');
}

function switchTab(tab) {
  ['settings','contacts','log'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`pane-${t}`).classList.toggle('active', t === tab);
  });
  if (tab === 'contacts') renderContactsDrawer();
  if (tab === 'log')      renderLog();
}

function openOverlay(id)  { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.overlay').forEach(el =>
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); })
);

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function nowStr() {
  return new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,5);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function load(key, def) {
  try { return JSON.parse(localStorage.getItem('pgsw_' + key)) ?? def; }
  catch { return def; }
}

function save(key, val) {
  localStorage.setItem('pgsw_' + key, JSON.stringify(val));
}

function getSetting(key, fallback) {
  return localStorage.getItem('pgsw_setting_' + key) || fallback;
}

function setSetting(key, val) {
  localStorage.setItem('pgsw_setting_' + key, val);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
['tpl-msg','wh-name'].forEach(k => {
  const v = localStorage.getItem('pgsw_setting_' + k);
  if (v) document.getElementById(k).value = v;
});

render();
</script>
